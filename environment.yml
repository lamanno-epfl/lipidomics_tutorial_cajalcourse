# CPU-only project environment for the course (no GPU anywhere). One command gives a COMPLETE
# env that runs every notebook (verified by re-executing all 12 in this env):
#     mamba env create -f environment.yml
#     mamba activate cajal-lipidomics
#     pip install -e .            # the course helper package (cajal_lipidomics)
#     python -m ipykernel install --user --name cajal-lipidomics --display-name "cajal-lipidomics"
#
# Notebook 3 (uMAIA) uses a SEPARATE env, environment-umaia.yml (older jax/numpyro stack).
# You only need to clone EUCLID for the one illustrative "production clustering" cell in NB6
# (git clone https://github.com/lamanno-epfl/EUCLID && pip install -e EUCLID); the transparent
# notebooks do not import it.
name: cajal-lipidomics
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - git
  - jupyterlab
  - ipykernel
  - ipywidgets
  - nbformat
  # scientific stack (everything the notebooks import)
  - numpy
  - scipy
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  - statsmodels
  - anndata
  - scanpy
  - harmonypy
  - leidenalg
  - python-igraph
  - openTSNE
  - umap-learn
  - xgboost
  - numba
  - zarr
  - rdkit
  - adjusttext
  - tqdm
  - pip:
      - -r requirements-extra.txt
